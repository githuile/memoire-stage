services:
  suricata:
    image: jasonish/suricata:latest
    container_name: suricata
    restart: always
    network_mode: host
    environment:
        - TZ=Europe/Paris
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - /var/log/suricata:/var/log/suricata
      - /etc/suricata:/etc/suricata
      - /var/lib/suricata/rules:/var/lib/suricata/rules
    command:
      - -i
      - enp1s0
      - -i
      - enp2s0
      - -c
      - /etc/suricata/suricata.yaml
  evebox:
    image: jasonish/evebox:latest
    container_name: evebox
    restart: always
    environment:
      - TZ=Europe/Paris
      - EVEBOX_RETENTION_PERIOD=168h
    depends_on:
      - suricata
    ports:
      - "5636:5636"
    volumes:
      - /var/log/suricata:/var/log/suricata
    command:
      - evebox
      - server
      - --host=0.0.0.0
      - --port=5636
      - --sqlite
      - --input
      - /var/log/suricata/eve.json